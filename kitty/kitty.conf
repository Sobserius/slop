# ============================================
# COLORS 
# ============================================
background #1e1e2e
foreground #cdd6f4
selection_background #45475a
selection_foreground #cdd6f4

# Cursor
cursor #f5e0dc
cursor_text_color #1e1e2e

# URL highlight
url_color #89b4fa

# Search hits
match_background #f9e2af
match_foreground #1e1e2e

# Tab bar
active_tab_background #313244
active_tab_foreground #cdd6f4
inactive_tab_background #1e1e2e
inactive_tab_foreground #6c7086

# Scrollback
scrollback_background #181825

# Window
window_border_color #313244
window_active_border_color #89b4fa
window_inactive_border_color #313244

# ============================================
# TERMINAL COLORS
# ============================================
# Black
color0 #45475a
color8 #6c7086

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2 #a6e3a1
color10 #a6e3a1

# Yellow
color3 #f9e2af
color11 #f9e2af

# Blue
color4 #89b4fa
color12 #89b4fa

# Magenta
color5 #cba6f7
color13 #cba6f7

# Cyan
color6 #94e2d5
color14 #94e2d5

# White
color7 #cdd6f4
color15 #cdd6f4

# ============================================
# FONTS
# ============================================
font_family "JetBrains Mono Nerd Font"
font_size 12
line_height 1.2
letter_spacing 0

# ============================================
# WINDOW
# ============================================
window_padding_width 10
window_margin_width 0

# ============================================
# TABS
# ============================================
tab_bar_edge top
tab_bar_margin_height 6
tab_bar_margin_width 8
tab_bar_background #1e1e2e
tab_bar_active_tab_background #313244
tab_bar_inactive_tab_background #1e1e2e
tab_bar_active_tab_foreground #cdd6f4
tab_bar_inactive_tab_foreground #6c7086

# ============================================
# SCROLLBAR
# ============================================
scrollbar_method plain
scrollbar_background #1e1e2e
scrollbar_color #45475a

# ============================================
# MOUSE
# ============================================
mouse_hide_wait 2
copy_on_select yes

# ============================================
# PERFORMANCE
# ============================================
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ============================================
# KEYBINDS
# ============================================
# Close tab
map super+w close_tab

# New tab
map super+t new_tab
map super+shift+t new_tab_with_cwd

# Next/prev tab
map super+right next_tab
map super+left previous_tab

# Move tab
map super+shift+right move_tab_forward
map super+shift+left move_tab_backward

# Tab numbers
map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9

# ============================================
# STARTUP
# ============================================
startup_session none
