# ============================================
# ~/.config/mango/config.conf
# ============================================

# ============================================
# COLORS
# ============================================
# Base colors 
rootcolor = 0x1e1e2eff
focuscolor = 0x89b4faff
bordercolor = 0x45475aff
urgentcolor = 0xf38ba8ff
maximizescreencolor = 0xcba6f7ff
scratchpadcolor = 0xf5c2e7ff
globalcolor = 0x89b4faff
overlaycolor = 0xcba6f7ff

# Corner radius
border_radius = 12

# ============================================
# APPEARANCE
# ============================================
borderpx = 2
gappih = 8
gappiv = 8
gappoh = 16
gappov = 16

# ---------- Input ----------
disable_trackpad = 0
tap_to_click = 1
tap_and_drag = 1
drag_lock = 1
trackpad_natural_scrolling = 0
middle_button_emulation = 0
disable_while_typing = 1

repeat_rate = 40
repeat_delay = 250
numlockon = 1
xkb_rules_layout = us,ru
xkb_rules_options = grp:alt_shift_toggle

# ---------- Focus and Behavior ----------
focus_on_activate = 1
sloppyfocus = 1
warpcursor = 1
focus_cross_monitor = 0
focus_cross_tag = 0
smartgaps = 0
no_border_when_single = 0
enable_floating_snap = 1
snap_distance = 20

# ---------- Cursor ----------
cursor_size = 24

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# Effect (mango-config style)
blur = 0
blur_layer = 1
blur_optimized = 1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor = 0x000000ff

# ---------- Layout Settings ----------
scroller_structs = 20
scroller_default_proportion = 0.8
scroller_focus_center = 0
scroller_prefer_center = 1
edge_scroller_pointer_focus = 1
scroller_default_proportion_single = 1.0
scroller_proportion_preset = 0.5,0.8,1.0
new_is_master = 1
smartgaps = 0
default_mfact = 0.55
default_nmaster = 1

# ---------- Overview ----------
hotarea_size = 10
enable_hotarea = 0
ov_tab_mode = 0
overviewgappi = 5
overviewgappo = 20

# ---------- Misc ----------
xwayland_persistence = 1
syncobj_enable = 0
axis_bind_apply_timeout = 100
single_scratchpad = 1

# ---------- Keybindings ----------
# Basics
bind = SUPER,Return,spawn,kitty
bind = SUPER+SHIFT,q,killclient
bind = SUPER,d,spawn,fuzzel
bind = SUPER,e,spawn, $HOME/.config/waybar/scripts/power-menu.sh
bind = SUPER,n,spawn, $HOME/.config/waybar/scripts/layout-menu.sh
bind = SUPER+SHIFT,c,reload_config
bind = SUPER+SHIFT,s,spawn_shell, $HOME/.config/mango/screenshot.sh
bind = none,Print,spawn_shell, $HOME/.config/mango/screenshot.sh

# Resize windows
bind = SUPER+CTRL,left,resizewin,-30,0
bind = SUPER+CTRL,right,resizewin,30,0
bind = SUPER+CTRL,up,resizewin,0,-30
bind = SUPER+CTRL,down,resizewin,0,30

# Swaylock
bind = SUPER+CTRL, l, spawn, swaylock
# Volume keys
bind = none, XF86AudioRaiseVolume, spawn, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = none, XF86AudioLowerVolume, spawn, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = none, XF86AudioMute, spawn, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Focus movement
bind = SUPER,left,focusdir,left
bind = SUPER,down,focusdir,down
bind = SUPER,up,focusdir,up
bind = SUPER,right,focusdir,right

# Move windows
bind = SUPER+SHIFT,left,exchange_client,left
bind = SUPER+SHIFT,down,exchange_client,down
bind = SUPER+SHIFT,up,exchange_client,up
bind = SUPER+SHIFT,right,exchange_client,right

# Workspaces (tags)
bind = SUPER,1,view,1,0
bind = SUPER,2,view,2,0
bind = SUPER,3,view,3,0
bind = SUPER,4,view,4,0
bind = SUPER,5,view,5,0
bind = SUPER,6,view,6,0
bind = SUPER,7,view,7,0
bind = SUPER,8,view,8,0
bind = SUPER,9,view,9,0
bind = SUPER,0,view,10,0

# Move window to tag
bind = SUPER+SHIFT,1,tag,1,0
bind = SUPER+SHIFT,2,tag,2,0
bind = SUPER+SHIFT,3,tag,3,0
bind = SUPER+SHIFT,4,tag,4,0
bind = SUPER+SHIFT,5,tag,5,0
bind = SUPER+SHIFT,6,tag,6,0
bind = SUPER+SHIFT,7,tag,7,0
bind = SUPER+SHIFT,8,tag,8,0
bind = SUPER+SHIFT,9,tag,9,0
bind = SUPER+SHIFT,0,tag,10,0

# Window controls
bind = SUPER+SHIFT,v,togglefloating
bind = SUPER,f,togglefullscreen
bind = SUPER+SHIFT,f,togglefakefullscreen
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Direct resize
bind = SUPER+ALT,Left,resizewin,-50,0
bind = SUPER+ALT,Right,resizewin,+50,0
bind = SUPER+ALT,Up,resizewin,0,-50
bind = SUPER+ALT,Down,resizewin,0,+50


# ---------- Startup Programs ----------
exec-once = XDG_CURRENT_DESKTOP=sway /usr/lib/xdg-desktop-portal-wlr &
exec-once = XDG_CURRENT_DESKTOP=sway /usr/lib/xdg-desktop-portal -r &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
# Waybar status bar
exec-once = waybar &
# Wallpaper
exec-once = swaybg -i /home/sob/wallpaper.png -m fill &
exec-once = swayidle -w timeout 300 "swaylock" &
exec-once = mako &

# ---------- Layer Rules ----------
layerrule = animation_type_open:slide,layer_name:fuzzel
layerrule = animation_type_close:slide,layer_name:fuzzel
layerrule = noshadow, fuzzel
layerrule = noanim:1, layer_name:selection


# ---------- Tag Rules ----------
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller
